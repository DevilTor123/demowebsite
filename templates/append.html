<!DOCTYPE html>
<html>
<head>
    <title>Add Sushi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff4e50 0%, #1a1a1a 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff4e50, #fc913a, #f9d423);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #222;
            font-size: 28px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff4e50;
            box-shadow: 0 0 0 3px rgba(255, 78, 80, 0.1);
        }

        select {
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff4e50 0%, #fc913a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 78, 80, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #ff4e50;
            font-weight: 500;
        }

        .back-link:hover {
            color: #fc913a;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>🍣 Add New Sushi</h2>

        <form method="POST">
            <div class="form-group">
                <label for="name">🍣 Sushi Name</label>
                <input id="name" name="name" placeholder="Enter sushi name" required>
            </div>

            <div class="form-group">
                <label for="price">💰 Price (THB)</label>
                <input id="price" name="price" type="number" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="image">🖼️ Sushi Image URL</label>
                <input id="image" name="image" placeholder="https://example.com/sushi.jpg">
            </div>

            <div class="form-group">
                <label for="stock">📦 Stock Quantity</label>
                <input id="stock" name="stock" type="number" placeholder="Stock amount" min="0" value="0" required>
            </div>

            <div class="form-group">
                <label for="category_id">🏷️ Sushi Category</label>
                <select id="category_id" name="category_id">
                    <option value="">Select Category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">✅ Add Sushi</button>
        </form>

        <a href="/" class="back-link">⬅️ Back to Menu</a>
    </div>
</div>

</body>
</html>
