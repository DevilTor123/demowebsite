<!DOCTYPE html>
<html>
<head>
    <title>Edit Sushi</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        .box {
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #222;
            font-size: 26px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1.5px solid #ddd;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #ff5e62;
            box-shadow: 0 0 0 2px rgba(255,94,98,0.15);
            outline: none;
        }

        select {
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff5e62, #ff9966);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            text-decoration: none;
            color: #ff5e62;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .cake-preview {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
        }

        .cake-preview img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .cake-preview h3 {
            margin: 0;
            font-size: 18px;
            color: #222;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>🍣 Edit Sushi Menu</h2>
        <div class="subtitle">Update your sushi details easily</div>

        {% if cake.image %}
        <div class="cake-preview">
            <img src="{{ cake.image }}" alt="{{ cake.name }}">
            <h3>{{ cake.name }}</h3>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>🍣 Sushi Name</label>
                <input name="name" value="{{ cake.name }}" required placeholder="e.g. Salmon Nigiri">
            </div>

            <div class="form-group">
                <label>💰 Price (THB)</label>
                <input name="price" type="number" step="0.01" min="0" value="{{ cake.price }}" required>
            </div>

            <div class="form-group">
                <label>🖼️ Image URL</label>
                <input name="image" value="{{ cake.image }}" placeholder="https://...">
            </div>

            <div class="form-group">
                <label>📦 Stock</label>
                <input name="stock" type="number" min="0" value="{{ cake.stock or 0 }}" required>
            </div>

            <div class="form-group">
                <label>🏷️ Category</label>
                <select name="category_id">
                    <option value="">Select Category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if category.id == cake.category_id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">✅ Update Sushi</button>
        </form>

        <a href="/" class="back-link">⬅️ Back to Menu</a>
    </div>
</div>

</body>
</html>
